services:
  - type: web
    name: bookease-pro-frontend
    env: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://bookeasemulti.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
      - type: file
        source: /404.html
        destination: /404.html
    headers:
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin-allow-popups
